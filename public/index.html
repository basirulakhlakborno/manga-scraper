<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaPill API Scraper</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .hero {
            text-align: center;
            max-width: 800px;
            padding: 20px;
        }
        .hero h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero p {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .gif-container {
            margin: 20px 0;
            text-align: center;
        }
        .gif-container img {
            max-width: 250px;
            height: auto;
            border-radius: 10px;
        }
        .content {
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 1.8em;
            }
            .gif-container img {
                max-width: 180px;
            }
            .content {
                padding: 20px;
                margin-top: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; margin-right: 10px;">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Manga Scraper
        </h1>
    </div>
    
    <div class="gif-container">
        <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExbHVnM215cmY5N2ZpZzNnZjh4MXFra2Q3d3Y4azJsZXl1dWkwZGhsOSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/IKFVtPf8jP6KJH16dB/giphy.gif" alt="Anime GIF">
    </div>
    
    <div class="content">
        <div class="github-link" style="text-align: center; margin: 20px 0;">
            <a href="https://github.com/basirulakhlakborno/manga-scraper" target="_blank" style="color: #4ecdc4; text-decoration: none; font-weight: bold; font-size: 1.2em;">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg" alt="GitHub" style="width: 24px; height: 24px; vertical-align: middle; margin-right: 8px;">
                View on GitHub
            </a>
        </div>
        
    </div>
</body>
</html>
